<div class="register-container">
  <div class="register-card">
    <h1>Cambiar Contraseña</h1>
    <p>Actualiza tu contraseña</p>

    <input
      type="email"
      [(ngModel)]="datos.correo"
      placeholder="Correo"
    >

    <!-- CONTRASEÑA ACTUAL -->
    <div class="password-container">
      <input
        class="password-input"
        [type]="mostrarActual ? 'text' : 'password'"
        [(ngModel)]="datos.actual"
        placeholder="Contraseña actual"
      >

      <button
        type="button"
        (click)="toggleActual()"
        class="btn-eye"
        aria-label="Mostrar u ocultar contraseña actual"
        title="Mostrar u ocultar contraseña actual"
      >
        <span class="sr-only">Mostrar u ocultar contraseña actual</span>

        <svg viewBox="0 0 24 24" aria-hidden="true">
          <path
            d="M12 5C6.5 5 2.1 8.4 1 12c1.1 3.6 5.5 7 11 7s9.9-3.4 11-7c-1.1-3.6-5.5-7-11-7zm0 11a4 4 0 1 1 0-8 4 4 0 0 1 0 8zm0-2.2a1.8 1.8 0 1 0 0-3.6 1.8 1.8 0 0 0 0 3.6z"
          ></path>
        </svg>
      </button>
    </div>

    <!-- NUEVA CONTRASEÑA -->
    <div class="password-container">
      <input
        class="password-input"
        [type]="mostrarNueva ? 'text' : 'password'"
        [(ngModel)]="datos.nueva"
        placeholder="Nueva contraseña"
      >

      <button
        type="button"
        (click)="toggleNueva()"
        class="btn-eye"
        aria-label="Mostrar u ocultar nueva contraseña"
        title="Mostrar u ocultar nueva contraseña"
      >
        <span class="sr-only">Mostrar u ocultar nueva contraseña</span>

        <svg viewBox="0 0 24 24" aria-hidden="true">
          <path
            d="M12 5C6.5 5 2.1 8.4 1 12c1.1 3.6 5.5 7 11 7s9.9-3.4 11-7c-1.1-3.6-5.5-7-11-7zm0 11a4 4 0 1 1 0-8 4 4 0 0 1 0 8zm0-2.2a1.8 1.8 0 1 0 0-3.6 1.8 1.8 0 0 0 0 3.6z"
          ></path>
        </svg>
      </button>
    </div>

    <!-- CONFIRMAR CONTRASEÑA -->
    <div class="password-container">
      <input
        class="password-input"
        [type]="mostrarConfirmar ? 'text' : 'password'"
        [(ngModel)]="datos.confirmar"
        placeholder="Confirmar contraseña"
      >

      <button
        type="button"
        (click)="toggleConfirmar()"
        class="btn-eye"
        aria-label="Mostrar u ocultar confirmación de contraseña"
        title="Mostrar u ocultar confirmación de contraseña"
      >
        <span class="sr-only">Mostrar u ocultar confirmación de contraseña</span>

        <svg viewBox="0 0 24 24" aria-hidden="true">
          <path
            d="M12 5C6.5 5 2.1 8.4 1 12c1.1 3.6 5.5 7 11 7s9.9-3.4 11-7c-1.1-3.6-5.5-7-11-7zm0 11a4 4 0 1 1 0-8 4 4 0 0 1 0 8zm0-2.2a1.8 1.8 0 1 0 0-3.6 1.8 1.8 0 0 0 0 3.6z"
          ></path>
        </svg>
      </button>
    </div>

    <button
      type="button"
      (click)="cambiarPassword()"
      [disabled]="cargando"
      aria-label="Cambiar contraseña"
      title="Cambiar contraseña"
    >
      {{ cargando ? 'Cambiando...' : 'Cambiar Contraseña' }}
    </button>

    <p
      class="mensaje"
      *ngIf="mensaje"
      [ngClass]="{
        'mensaje-exito': tipoMensaje === 'success',
        'mensaje-error': tipoMensaje === 'error'
      }"
    >
      {{ mensaje }}
    </p>

    <a routerLink="/">Volver al login</a>
  </div>
</div>
