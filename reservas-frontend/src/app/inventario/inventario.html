<div class="inventario-container">
  <div class="inventario-card">
    <div class="encabezado">
      <h1>Servicios</h1>
      <a routerLink="/dashboard" class="btn-volver">Volver al Dashboard</a>
    </div>

    <p class="mensaje" *ngIf="mensaje">{{ mensaje }}</p>

    <div class="formulario">
      <input
        type="text"
        [(ngModel)]="servicio.nombre"
        name="nombre"
        placeholder="Nombre"
      />

      <input
        type="text"
        [(ngModel)]="servicio.descripcion"
        name="descripcion"
        placeholder="Descripción"
      />

      <input
        type="number"
        [(ngModel)]="servicio.precio"
        name="precio"
        placeholder="Precio"
      />

      <div class="acciones-form">
        <button
          type="button"
          *ngIf="!editando"
          (click)="crearServicio()"
          [disabled]="creandoServicio"
        >
          Crear Servicio
        </button>

        <button
          type="button"
          *ngIf="editando"
          class="btn-editar"
          (click)="actualizarServicio()"
        >
          Guardar Cambios
        </button>

        <button
          type="button"
          *ngIf="editando"
          class="btn-cancelar"
          (click)="cancelarEdicionServicio()"
        >
          Cancelar
        </button>

        <button
          type="button"
          class="btn-cargar"
          (click)="cargarServicios()"
          [disabled]="cargandoServicios"
        >
          Cargar Servicios
        </button>
      </div>
    </div>

    <hr />

    <div *ngIf="mostrarListaCompleta">
      <h3>Servicios guardados en la base de datos</h3>

      <ul class="lista-servicios">
        <li *ngFor="let s of servicios; let i = index">
          <span>
            {{ i + 1 }} - {{ s.nombre }} - {{ s.descripcion }} - ${{ s.precio }}
          </span>

          <div class="acciones-item">
            <button
              type="button"
              class="btn-editar"
              (click)="editarServicio(s)"
            >
              Editar
            </button>

            <button
              type="button"
              class="btn-eliminar"
              (click)="eliminarServicio(s.id)"
            >
              Eliminar
            </button>
          </div>
        </li>
      </ul>
    </div>
  </div>
</div>
