<div class="inventario-container">
  <div class="inventario-card">
    <div class="encabezado">
      <h1>Servicios</h1>
      <a routerLink="/dashboard" class="btn-volver">Volver al Dashboard</a>
    </div>

    <p class="mensaje">{{ mensaje }}</p>

    <div class="formulario">
      <input
        type="text"
        [(ngModel)]="servicio.nombre"
        name="nombre"
        placeholder="Nombre"
      >

      <input
        type="text"
        [(ngModel)]="servicio.descripcion"
        name="descripcion"
        placeholder="Descripción"
      >

      <input
        type="number"
        [(ngModel)]="servicio.precio"
        name="precio"
        placeholder="Precio"
      >

      <div class="acciones-form">
        <button
          type="button"
          *ngIf="!editando"
          (click)="crearServicio()"
          [disabled]="creandoServicio"
        >
          {{ creandoServicio ? 'Creando...' : 'Crear Servicio' }}
        </button>

        <button
          type="button"
          *ngIf="editando"
          (click)="actualizarServicio()"
        >
          Guardar Cambios
        </button>

        <button
          type="button"
          *ngIf="editando"
          class="btn-cancelar"
          (click)="cancelarEdicionServicio()"
        >
          Cancelar
        </button>

        <button
          type="button"
          class="btn-cargar"
          (click)="cargarServicios()"
          [disabled]="cargandoServicios"
        >
          {{ cargandoServicios ? 'Cargando...' : 'Cargar Servicios' }}
        </button>
      </div>
    </div>

    <hr>

    <ul class="lista-servicios">
      <li *ngFor="let s of servicios">
        <span>
          {{ s.id }} - {{ s.nombre }} - {{ s.descripcion }} - ${{ s.precio }}
        </span>

        <div class="acciones-item">
          <button type="button" class="btn-editar" (click)="editarServicio(s)">
            Editar
          </button>

          <button type="button" class="btn-eliminar" (click)="eliminarServicio(s.id)">
            Eliminar
          </button>
        </div>
      </li>
    </ul>
  </div>
</div>
